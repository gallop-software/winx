# Push to main branch on version bump
# Runs when dev branch is pushed with a version change
name: Push Downstream

on:
  push:
    branches:
      - dev

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GALLOP_APP_ID }}
          private-key: ${{ secrets.GALLOP_APP_PRIVATE_KEY }}
          owner: gallop-software
          repositories: winx-pro

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          path: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for version bump
        id: version-check
        working-directory: dev
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Get previous version from git history (commit before the current version bump)
          PREV_VERSION=$(git log --format=%H -1 --skip=1 -G'"version":' -- package.json | xargs -I{} git show {}:package.json | jq -r .version)
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" == "$PREV_VERSION" ] || [ -z "$PREV_VERSION" ]; then
            echo "No version bump detected (current: $CURRENT_VERSION, prev: $PREV_VERSION)"
            echo "should_sync=false" >> $GITHUB_OUTPUT
          else
            echo "Version bump detected: $PREV_VERSION -> $CURRENT_VERSION"
            echo "should_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Get commit messages since last version bump
        if: steps.version-check.outputs.should_sync == 'true'
        id: commits
        working-directory: dev
        run: |
          # Find the previous version bump commit on the dev branch
          PREV_BUMP=$(git log --format=%H -2 -G'"version":' -- package.json | tail -1)
          if [ -z "$PREV_BUMP" ]; then
            COMMITS=$(git log --oneline --no-decorate | head -20)
          else
            COMMITS=$(git log --oneline --no-decorate $PREV_BUMP..HEAD)
          fi

          # Store commits for release notes
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Clone downstream target
        if: steps.version-check.outputs.should_sync == 'true'
        run: |
          # Clone main branch of this repo for pro distribution
          git clone --branch main https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/gallop-software/winx-pro.git pro

      - name: Setup Node.js
        if: steps.version-check.outputs.should_sync == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync to main branch
        if: steps.version-check.outputs.should_sync == 'true'
        run: |
          # Copy all files except .git and node_modules
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            dev/ pro/

          # Remove workflows from main branch (they only belong on dev)
          rm -rf pro/.github/workflows

      - name: Commit and push to main branch
        if: steps.version-check.outputs.should_sync == 'true'
        working-directory: pro
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"
          git config user.name "gallop-sync-bot[bot]"
          git config user.email "gallop-sync-bot[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit to winx-pro"
          else
            cat <<EOF | git commit -F -
          Release $VERSION

          ${{ steps.commits.outputs.commits }}
          EOF
            git push --force origin main
          fi

          # Create tag (force in case it exists from failed run)
          git tag -f "$VERSION"
          git push --force origin "$VERSION"

      - name: Create release on winx-pro
        if: steps.version-check.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_NOTES: ${{ steps.commits.outputs.commits }}
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"

          # Create zip
          REPO_NAME="winx-pro"
          cp -r pro $REPO_NAME-temp
          rm -rf $REPO_NAME-temp/.git
          mkdir -p $REPO_NAME-folder/$REPO_NAME
          # Use shopt to handle empty globs gracefully
          shopt -s dotglob nullglob
          mv $REPO_NAME-temp/* $REPO_NAME-folder/$REPO_NAME/ 2>/dev/null || true
          shopt -u dotglob nullglob
          cd $REPO_NAME-folder
          zip -r ../$REPO_NAME.zip $REPO_NAME
          cd ..

          # Delete existing release if present (for retries)
          gh release delete "$VERSION" --repo gallop-software/winx-pro --yes 2>/dev/null || true

          # Write release notes to file to avoid shell expansion issues
          echo "$RELEASE_NOTES" > release-notes.txt

          # Create release
          gh release create "$VERSION" \
            --repo gallop-software/winx-pro \
            --title "Release $VERSION" \
            --notes-file release-notes.txt \
            $REPO_NAME.zip
